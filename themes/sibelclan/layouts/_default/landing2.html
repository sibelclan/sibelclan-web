<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta name="robots" content="noindex">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, maximum-scale=1.0">
    <meta property="og:image" content="{{ .Params.cover_art }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sibelclan - {{ .Params.song_name }}">
    <meta property="og:description" content="">
    <meta name="description" content="">
    <title>Sibelclan - {{ .Params.song_name }}</title>
    <style>
        html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif
        }
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            overflow: hidden;
            overflow-y: scroll;
            position: absolute;
            width: 100%;
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            text-align: center
        }
        body, a { color: #fff }
        main {
            background: transparent;
            width: 90%;
            max-width: 420px;
            margin: 32px 0 80px;
            position: relative;
            z-index: 1
        }
        #bg {
            z-index: -1;
            opacity: .85;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url({{ .Params.cover_art }}) 50% no-repeat;
            background-size: cover;
            overflow: hidden
        }
        #bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background: inherit;
            background-size: cover;
            transform: scale(1.6)
        }
        #bg::after {
            content: "";
            position: absolute;
            inset: 0;
            -webkit-backdrop-filter: blur(60px) saturate(1.4);
            backdrop-filter: blur(60px) saturate(1.4);
            background: linear-gradient(180deg, rgba(13,13,13,0.35) 0%, rgba(13,13,13,0.85) 100%)
        }
        #i {
            opacity: 0;
            position: absolute
        }
        #top {
            padding: 8px 4px 18px;
            margin-bottom: 8px
        }
        #a {
            display: inline-block;
            width: 250px;
            height: 250px;
            border-radius: 14px;
            background: url({{ .Params.cover_art }}) 50% no-repeat;
            background-size: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
            margin: 0 auto
        }
        #t {
            margin: 18px 0 4px;
            font-size: 25px;
            font-weight: 700;
            letter-spacing: -0.01em
        }
        #t + #d {
            margin-top: 12px
        }
        #d {
            font-size: 14px;
            line-height: 1.45;
            color: rgba(255,255,255,0.72);
            margin: 0 6px 4px;
            white-space: pre-line
        }
        #b {
            position: relative;
            padding: 0
        }
        #b a {
            line-height: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(48,48,48,0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 56px;
            padding: 8px 16px 8px 18px;
            text-align: left;
            gap: 14px;
            transition: transform .12s ease, background .12s ease
        }
        #b a:hover {
            background: rgba(64,64,64,0.78);
            transform: translateY(-1px)
        }
        #b a > div {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }
        #b a > div svg {
            flex-shrink: 0;
            background: rgba(0,0,0,0.55);
            border-radius: 10px;
            padding: 10px;
            width: 24px;
            height: 24px;
            box-sizing: content-box
        }
        #b a > div svg[width="140"],
        #b a > div svg[width="30px"] {
            width: 24px;
            height: 24px
        }
        #b span {
            border: none;
            padding: 0;
            font-size: 0;
            white-space: nowrap;
            margin-left: 8px;
            color: rgba(255,255,255,0.5);
            flex-shrink: 0
        }
        #b span svg {
            width: 24px;
            height: 24px;
            color: rgba(255,255,255,0.6)
        }
        #b a:hover span svg {
            color: #fff
        }
        svg.play {
            margin: 0
        }
        #b svg, #b span, #bg {
            vertical-align: middle
        }
        #so {
            text-align: center;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 12px;
            line-height: 36px;
        }
        #so a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            transition: background .12s ease
        }
        #so a:hover {
            background: rgba(255,255,255,0.18)
        }
        #so svg {
            font-size: 16px;
            color: #fff !important;
            opacity: 0.9
        }
        #so svg:hover {
            opacity: 1
        }
        #so.one a {
            width: auto;
            height: auto;
            border-radius: 999px;
            padding: 9px 16px;
            gap: 8px;
            line-height: 1;
            text-decoration: none
        }
        #so.one .lbl {
            font-size: 14px;
            opacity: 0.9
        }
        #f {
            position: relative;
            width: 100%;
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
            color: rgba(255,255,255,0.5)
        }
        #f a {
            color: rgba(255,255,255,0.7)
        }
        #f a, #b a {
            text-decoration: none
        }
        body.light {
            background: #f5f5f5
        }
        body.light, body.light a {
            color: #222
        }
        body.light #bg::after {
            background: linear-gradient(180deg, rgba(245,245,245,0.35) 0%, rgba(245,245,245,0.85) 100%)
        }
        body.light #d {
            color: rgba(0,0,0,0.65)
        }
        body.light #b a {
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(0,0,0,0.06);
            color: #222
        }
        body.light #b a:hover {
            background: rgba(255,255,255,0.88)
        }
        body.light #b span svg {
            color: rgba(0,0,0,0.5)
        }
        body.light #b a:hover span svg {
            color: #222
        }
        body.light #so a {
            background: rgba(0,0,0,0.06)
        }
        body.light #so a:hover {
            background: rgba(0,0,0,0.15)
        }
        body.light #so svg {
            color: #222 !important
        }
        body.light #f {
            color: rgba(0,0,0,0.5)
        }
        body.light #f a {
            color: rgba(0,0,0,0.7)
        }
        body.no-title #a {
            margin-bottom: 24px
        }
        body.no-title.no-description #a {
            margin-bottom: 10px
        }
    </style>
    <link rel="preload" href="{{ .Params.cover_art }}" as="image" fetchpriority="high">
</head>
